{% extends 'base.html' %}
{% load static %}

{% block header %}
<div class="hero-wrap hero-bread" style="background-image: url({% static 'images/bg_5.jpg' %});">
    <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
            <div class="col-md-9 ftco-animate text-center">
                <h1 class="mb-0 bread"></h1>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block content %}
<div class="container mt-5 mb-5 text-center">
{% if payment %}
<form action="{% url 'cart:paymentsuccess' %}" method="POST">
<script
   src="https://checkout.razorpay.com/v1/checkout.js"
    data-key="rzp_test_SeVBxLXt1eemNi"
    data-amount={{payment.amount}} 
    data-currency="INR"
    data-order_id={{payment.id}}
    data-buttontext="Proceed to pay"
    data-name="EliteMart"
    data-description="A Wild Sheep Chase is the third novel by Japanese author Haruki Murakami"
    data-image="https://example.com/your_logo.jpg"
    data-prefill.name="{{user.username}}"
    data-prefill.email="abin.jos@example.com"
    data-theme.color="black"
></script>
<input type="hidden" custom="Hidden Element" name="hidden"/>
</form>
{% else %}

<h2 class="text-center">Order Placed Successfully</h2>
<a href="/">Continue Shopping</a>
{% endif %}
</div>
{% endblock %}
