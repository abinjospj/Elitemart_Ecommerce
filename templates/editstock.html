{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}
{% block header %}
<div class="hero-wrap hero-bread" style="background-image: url({% static 'images/bg_5.jpg' %});">
    <div class="container">
        <div class="row no-gutters slider-text align-items-center justify-content-center">
            <div class="col-md-9 ftco-animate text-center">
                <p class="breadcrumbs">
                    <span class="mr-2">
                        <a href="index.html">Home</a>
                    </span>
                    <span>Register</span>
                </p>
                <h1 class="mb-0 bread">Register</h1>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block content %}
<div class="container mt-5 p-5 text-center w-50 border border-2 border-light">

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <input type="submit">
    </form>

</div>
{% endblock %}
